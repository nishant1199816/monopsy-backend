# ==============================================
# MONOPSY BACKEND — application.properties
# ==============================================

# Server
server.port=${PORT:8080}

# ==============================================
# DATABASE — Railway PostgreSQL (env vars)
# ==============================================
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/monopsy_local}
spring.datasource.username=${PGUSER:postgres}
spring.datasource.password=${PGPASSWORD:password}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection Pool
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=20000

# ==============================================
# JPA / HIBERNATE
# ==============================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# ==============================================
# JWT
# ==============================================
app.jwt.secret=${JWT_SECRET:MonopsySecretKey2024_ChangeThisInProduction_AtLeast32Chars}
app.jwt.expiration=86400000

# ==============================================
# FILE UPLOAD
# ==============================================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=20MB

# ==============================================
# LOGGING
# ==============================================
logging.level.root=WARN
logging.level.com.monopsy=INFO
